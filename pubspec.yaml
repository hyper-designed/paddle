name: paddle
description: A Dart package for Paddle, a payment processing service.

version: 0.1.0

repository: https://github.com/hyper-designed/paddle

environment:
  sdk: ^3.7.2

dependencies:
  collection: ">=1.18.0 <2.0.0"
  equatable: ">=2.0.5 <3.0.0"
  json_annotation: ">=4.12.0 <5.0.0"
  chopper: ^8.5.2
  http: ">=1.2.2 <2.0.0"
  logging: ">=1.3.0 <2.0.0"

dev_dependencies:
  lints: ^6.1.0
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  chopper_generator: ^8.6.2
  test: ^1.31.1
  dotenv: ^4.2.0